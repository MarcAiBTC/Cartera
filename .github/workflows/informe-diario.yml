name: Informe diario por correo

# El cron de GitHub va en UTC, no ajusta el horario de verano y, sobre todo,
# suele dispararse con 30 min – 2 h de retraso. Por eso se programan varios
# disparos de respaldo y el script acepta la franja 22:00–23:59 en Europe/Madrid.
# Una cache con la fecha del día evita que los respaldos envíen el correo dos veces.
on:
  schedule:
    - cron: '5 20 * * 1-5'    # 22:05 Madrid en verano (CEST)
    - cron: '35 20 * * 1-5'   # respaldo verano
    - cron: '5 21 * * 1-5'    # 22:05 Madrid en invierno (CET) · respaldo verano
    - cron: '35 21 * * 1-5'   # respaldo
    - cron: '5 22 * * 1-5'    # respaldo invierno
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Solo generar el informe (no enviar correo)'
        type: boolean
        default: false

concurrency: informe-diario

permissions:
  contents: read

jobs:
  informe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fecha del día en Madrid
        id: marca
        run: echo "dia=$(TZ=Europe/Madrid date +%F)" >> "$GITHUB_OUTPUT"

      - name: ¿Ya se envió el informe de hoy?
        id: dedupe
        if: github.event_name == 'schedule'
        uses: actions/cache/restore@v4
        with:
          path: .informe-enviado
          key: informe-enviado-${{ steps.marca.outputs.dia }}

      - name: Generar y enviar el informe
        id: envio
        if: github.event_name == 'workflow_dispatch' || steps.dedupe.outputs.cache-hit != 'true'
        env:
          POSICIONES_JSON: ${{ secrets.POSICIONES_JSON }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # Un disparo manual salta el control de la franja horaria
          FORCE: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '1' || '' }}
        run: |
          node scripts/informe_diario.mjs
          if [ -f .informe-enviado ]; then echo "enviado=1" >> "$GITHUB_OUTPUT"; fi

      - name: Marcar el día como enviado (evita duplicados de los respaldos)
        if: github.event_name == 'schedule' && steps.envio.outputs.enviado == '1'
        uses: actions/cache/save@v4
        with:
          path: .informe-enviado
          key: informe-enviado-${{ steps.marca.outputs.dia }}

      - name: Guardar copia del informe
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: informe-html
          path: informe.html
          if-no-files-found: ignore
          retention-days: 7
