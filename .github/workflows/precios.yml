name: Actualizar precios

on:
  schedule:
    - cron: "*/15 * * * *"   # cada 15 min (GitHub puede retrasarlo unos minutos)
  workflow_dispatch:          # botón manual en la pestaña Actions

permissions:
  contents: write

concurrency:
  group: precios
  cancel-in-progress: true

jobs:
  precios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Descargar precios
        run: python update_precios.py

      - name: Publicar precios.json si cambió
        run: |
          git config user.name "precios-bot"
          git config user.email "precios-bot@users.noreply.github.com"
          git add precios.json
          git diff --cached --quiet && echo "Sin cambios" || (git commit -m "precios $(date -u +'%Y-%m-%d %H:%M')" && git push)
